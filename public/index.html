<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">

  <title>Shravan.Chat</title>

 <style>
  body {
    margin: 0;
    font-family: 'Fira Code', 'Courier New', monospace;
    background-color: #0d0d0d;
    color: #00ff99;
    transition: all 0.3s ease;
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar {
    width: 10px;
  }
  ::-webkit-scrollbar-thumb {
    background: #00ff99;
    border-radius: 5px;
  }

  #main-container {
    display: flex;
    padding: 20px;
    flex-direction: row;
    height: 63vh;
    border-top: 2px solid #00ff99;
    border-bottom: 2px solid #00ff99;
    border-radius: 24px;
    overflow: hidden;
  }

  #chat {
    flex: 3;
    padding: 20px;
    overflow-y: auto;
    background-color: #111;
    border-right: 2px solid #00ff99;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .message {
    background-color: #1a1a1a;
    padding: 10px 15px;
    border-radius: 10px;
    max-width: 75%;
    box-shadow: 0 0 5px #00ff99;
    animation: fadeIn 0.3s ease-in;
  }

  .message.user {
    align-self: flex-end;
    background-color: #002b36;
    color: #00ffff;
    box-shadow: 0 0 8px #00ffff;
  }

  .message.admin {
    background-color: #330000;
    color: hsl(0, 52%, 79%);
    box-shadow: 0 0 8px hsl(117, 68%, 52%);
  }

  #userListContainer {
    flex: 1;
    background-color: hsl(0, 3%, 14%);
    padding: 20px;
    border-radius: 20px;
    overflow-y: auto;
    border-left: 2px solid #00ff99;
  }

  #userListContainer h3 {
    margin-top: 0;
    border-bottom: 1px dashed #00ff99;
    padding-bottom: 5px;
  }

  #userList li {
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 5px;
    margin-bottom: 5px;
    background-color: #1a1a1a;
    transition: background 0.3s ease;
  }

  #userList li:hover {
    background-color: #42d9e733;
  }

  
#form {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 10px;
}

#messageInput {
  flex: 1;
  min-height: 40px;
  padding: 8px;
  border: 1px solid hsl(150, 75%, 49%);
  border-radius: 15px;
  background-color: #222;
  color: white;
  font-family: 'Fira Code', monospace;
}






  #messageInput:focus {
    outline: none;
    box-shadow: 0 0 20px #00ff99;
  }

  #emoji-picker {
    display: none;
    position: absolute;
    right: 60px;
    cursor: pointer;
    bottom: 70px;
    background-color: #1f1f1f;
    border: 1px solid #00ff99;
    padding: 10px;
    border-radius: 10px;
    max-width: 200px;
    flex-wrap: wrap;
    z-index: 999;
  }

  #emoji-picker span {
    cursor: pointer;
    font-size: 22px;
    padding: 5px;
    transition: transform 0.2s ease;
  }

  #emoji-picker span:hover {
    transform: scale(1.3);
  }
  #send-button {
  padding: 12px 20px;
  font-size: 14px;
  border: none;
  border-radius: 14px;
  background-color: #1e90ff;
  color: white;
  font-family: 'Fira Code', monospace;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

#send-button:hover {
  background-color: #007acc;
}


  /* Themes */
  .dark-mode {
    background-color: #0d0d0d;
    color: #00ff99;
  }

  .light-mode {
    background-color: #f9f9f9;
    color: #9ba0eb;
  }

  .blue-mode {
    background-color: #002244;
    color: #00ccff;
  }

  /* Responsive Layout */
  @media screen and (max-width: 768px) {
    #main-container {
      flex-direction: column;
    }

    #chat {
      flex: 1;
      border-right: none;
    }

    #userListContainer {
      flex: 1;
      border-left: none;
      border-top: 1px solid #00ff99;
    }

    #form {
      margin: 10px;
    }

    #emoji-picker {
      right: 20px;
      bottom: 100px;
    }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

</head>
<body class="dark-mode">
<h1 style="margin-left: 20px;margin-top: 3px;">ShravanZz🥱</h1>
<h3 style="margin-left: 170px; margin-top:-24px;padding-top: 1px;">varmA🤗</h3>

<div id="main-container">
  <div id="chat"></div>

  <div id="userListContainer">
    <h3>Users:</h3>
    <ul id="userList"></ul>
  </div>
</div>

<form id="form">
  <div id="messageInput" contenteditable="true" placeholder="Type a message..."></div>
  <button type="button" style="position: fixed;right: 110px;bottom: 95px;border-radius: 10px;" id="emoji-button">😎</button>
  <button type="submit" id="send-button">Send</button>
  <div id="emoji-picker">
    <span>😊</span><span>😂</span><span>😍</span><span>🤔</span><span>🙄</span>
    <span>😢</span><span>😎</span><span>💯</span><span>🎉</span><span>🚀</span>
    <span>👍</span><span>👎</span><span>❗</span><span>❓</span>
  </div>
</form>

<button id="change-theme-button" style="position: fixed; top: 20px;background-color: lightgreen; right: 20px;border-radius: 10px; padding: 8px;">Change Theme</button>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const room = urlParams.get('room') || 'default';
  const username = prompt("Enter your username:") || "Anonymous";
  const contact = prompt("Enter your contact number (required):");

  if (!contact) {
    alert("Contact number is required to join the chat.");
    throw new Error("Contact number required");
  }

  const socket = new WebSocket(
    location.protocol === 'https:' 
      ? `wss://${location.host}/?room=${room}&username=${encodeURIComponent(username)}&contact=${encodeURIComponent(contact)}`
      : `ws://${location.host}/?room=${room}&username=${encodeURIComponent(username)}&contact=${encodeURIComponent(contact)}`
  );

  const chat = document.getElementById('chat');
  const form = document.getElementById('form');
  const messageInput = document.getElementById('messageInput');
  const emojiButton = document.getElementById('emoji-button');
  const emojiPicker = document.getElementById('emoji-picker');
  const userListDiv = document.getElementById('userList');

  socket.addEventListener('open', () => {
    socket.send(JSON.stringify({ type: 'join', username }));
  });

  socket.addEventListener('message', (event) => {
    const data = JSON.parse(event.data);
    const div = document.createElement('div');

    if (data.type === 'system') {
      div.textContent = `🤗 ${data.message}`;
      div.style.color = '#FF0000';
    } else if (data.type === 'message') {
      if (data.message.includes('<pre><code>')) {
        const id = `code-${Date.now() + Math.random().toString(36).substr(2, 5)}`;
        div.innerHTML = `
          <div style="position: relative;">
            <strong style="color:${data.usernameColor || '#00FF00'}">${data.username}:</strong> ${data.message}
            <button onclick="copyCode('${id}')" style="position: absolute; top: 8px; right: 8px; background: #222; color: #00FF00; border: 1px solid #00FF00; border-radius: 5px; padding: 4px 8px; cursor: pointer;">CopyCat</button>
          </div>
        `;
        setTimeout(() => {
          const codeBlock = div.querySelector('pre code');
          if (codeBlock) codeBlock.id = id;
        }, 0);
      } else {
        div.innerHTML = `<strong style="color:${data.usernameColor || '#00FF00'}">${data.username}:</strong> ${data.message}`;
      }
    } else if (data.type === 'privateMessage') {
      div.innerHTML = `<strong>Private Message from ${data.username}:</strong> ${data.message}`;
      div.style.backgroundColor = '#444444';
      div.style.border = '1px solid #00FF00';
      div.style.borderRadius='20px';
      div.style.maxHeight='36px';
     
    } else if (data.type === 'userlist') {
      userListDiv.innerHTML = '';
      data.users.forEach(user => {
        const li = document.createElement('li');
        li.textContent = user;
        li.onclick = () => {
          if (user === username) return;
          const pm = prompt(`Send private message to ${user}:`);
          if (pm) {
            socket.send(JSON.stringify({
              type: 'privateMessage',
              recipient: user,
              message: pm
            }));
          }
        };
        userListDiv.appendChild(li);
      });
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    let message = messageInput.innerHTML.trim();
    if (!message) return;

    if (message.includes('```')) {
      message = message.replace(/```/g, match => match === '```' ? '<pre><code>' : '</code></pre>');
    }

    socket.send(JSON.stringify({ type: 'message', message }));
    messageInput.innerHTML = '';
  });

  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.dispatchEvent(new Event('submit'));
    }
  });

  emojiButton.addEventListener('click', () => {
    emojiPicker.style.display = emojiPicker.style.display === 'block' ? 'none' : 'block';
  });

  emojiPicker.addEventListener('click', (e) => {
    if (e.target.tagName === 'SPAN') {
      messageInput.innerHTML += e.target.innerText;
      emojiPicker.style.display = 'none';
      messageInput.focus();
    }
  });

  const themes = ['dark-mode', 'light-mode', 'blue-mode'];
  let currentTheme = 0;
  document.getElementById('change-theme-button').addEventListener('click', () => {
  document.body.classList.remove(themes[currentTheme]);
  currentTheme = (currentTheme + 1) % themes.length;
  document.body.classList.add(themes[currentTheme]);

  // Apply theme class to chat and messageInput
  document.getElementById('chat').className = themes[currentTheme];
  document.getElementById('form').className = themes[currentTheme];
  document.getElementById('messageInput').className = themes[currentTheme];
});


  fetch(`${location.origin}/log-visitor`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, contact })
  })
    .then(res => res.text())
    .then(console.log)
    .catch(console.error);

  function copyCode(id) {
    const codeElement = document.getElementById(id);
    if (!codeElement) return;

    navigator.clipboard.writeText(codeElement.innerText).then(() => {
      alert("Code copied to clipboard!");
    });
  }
</script>

<p style="text-align: center; font-size: large;">&copy;copyright 2025 by Shravan.</p>
</body>
</html>
